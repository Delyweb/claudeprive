services:
  claudeprive:
    build: .
    ports:
      - "8009:8009"
    volumes:
      - claudeprive-data:/app/data
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-eu-west-3}
    restart: unless-stopped

volumes:
  claudeprive-data:
