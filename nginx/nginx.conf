# Configuration nginx pour ClaudePrivé (standalone)
# À utiliser si déploiement indépendant avec nginx en reverse proxy

upstream claudeprive {
    server claudeprive:8009;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://claudeprive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
        proxy_read_timeout 120s;
    }
}
