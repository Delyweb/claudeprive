<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClaudePrivé – Connexion</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232ec4a0'/><text x='50' y='68' font-size='52' font-weight='bold' text-anchor='middle' fill='%230f1117' font-family='sans-serif'>CP</text></svg>">
    <style>
        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d27;
            --bg-tertiary: #242736;
            --text-primary: #e4e6f0;
            --text-secondary: #9ca0b4;
            --text-muted: #6b7089;
            --accent: #2ec4a0;
            --accent-hover: #26a88a;
            --danger: #e74c6f;
            --border: #2d3044;
            --radius: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            max-width: 90vw;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .login-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: var(--accent);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 700; color: var(--bg-primary);
        }
        .login-logo h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
        }
        .login-logo span {
            font-size: 0.7em;
            opacity: 0.6;
            font-weight: normal;
        }
        .error-msg {
            background: rgba(231, 76, 111, 0.15);
            border: 1px solid var(--danger);
            color: var(--danger);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            margin-top: 16px;
        }
        input {
            width: 100%;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
        }
        input::placeholder { color: var(--text-muted); }
        .login-btn {
            width: 100%;
            margin-top: 24px;
            padding: 11px;
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: background 0.2s;
        }
        .login-btn:hover { background: var(--accent-hover); }
        .login-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">
        <div class="logo-icon">CP</div>
        <h1>ClaudePrivé <span>v2.3</span></h1>
    </div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
        <label for="username">Identifiant</label>
        <input type="text" id="username" name="username" placeholder="Votre identifiant"
               value="{{ username or '' }}" autocomplete="username" autofocus required>

        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="••••••••"
               autocomplete="current-password" required>

        <button type="submit" class="login-btn">Se connecter</button>
    </form>
</div>
</body>
</html>
